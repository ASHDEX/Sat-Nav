graphhopper:
  datareader.file: "india-260402.osm.pbf"
  graph.location: graph-cache

  graph.flag_encoders: car

  profiles:
    - name: car
      vehicle: car
      weighting: fastest

  profiles_ch:
    - profile: car

  profiles_lm: []

  prepare.min_network_size: 200
  routing.non_ch.max_waypoint_distance: 1000000
  graph.dataaccess: MMAP

server:
  application_connectors:
    - type: http
      port: 8989
      bind_host: localhost
  request_log:
    appenders: []
  admin_connectors:
    - type: http
      port: 8990
      bind_host: localhost

logging:
  appenders:
    - type: console
      time_zone: UTC
      log_format: "%d{YYYY-MM-dd HH:mm:ss.SSS} [%thread] %-5level %logger{36} - %msg%n"
